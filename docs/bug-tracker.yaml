  - date: 6 Jan 2024
    source: ApiResult.CheckErr - line 400 and 407
    notes: |
      CheckErr does not have a errcode argument only an optional one. The method does not apply a default errcode 
      if the optional errcode is nil AND the err is found to be != nil.
